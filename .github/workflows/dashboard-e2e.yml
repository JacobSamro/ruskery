name: dashboard e2e (Playwright)

# Browser-level tests of the embedded dashboard against the real binary. Heavy
# (builds the UI + release binary + 3 browsers), so it runs on PRs and on demand.
on:
  pull_request:
  workflow_dispatch:

jobs:
  playwright:
    name: dashboard e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Tier-B (repo/analytics-with-data) specs push images; point storage at a
      # local MinIO. Tier-A specs ignore storage (lazy client).
      RUSKERY_STORAGE__ENDPOINT: http://127.0.0.1:9000
      RUSKERY_STORAGE__BUCKET: ruskery
      RUSKERY_STORAGE__ACCESS_KEY_ID: ruskery
      RUSKERY_STORAGE__SECRET_ACCESS_KEY: ruskerysecret
      RUSKERY_STORAGE__FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ruskery
      AWS_SECRET_ACCESS_KEY: ruskerysecret
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Start RustFS + create bucket
        run: |
          docker run -d --name rustfs -p 9000:9000 \
            -e RUSTFS_ACCESS_KEY=ruskery -e RUSTFS_SECRET_KEY=ruskerysecret \
            -e RUSTFS_ADDRESS=0.0.0.0:9000 \
            rustfs/rustfs:latest
          # Best-effort: Tier-B specs skip if storage isn't reachable.
          for i in $(seq 1 30); do
            if aws --endpoint-url http://127.0.0.1:9000 s3 mb s3://ruskery 2>/dev/null; then
              echo "bucket created"; break
            fi
            echo "waiting for rustfs..."; sleep 2
          done

      # Build the UI first — the release binary embeds web/.output at compile time.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build web UI + install test deps
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run generate

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build ruskery (release, embeds UI)
        run: cargo build --release --locked

      - name: Install Playwright browsers
        working-directory: web
        run: bunx playwright install --with-deps

      - name: Run dashboard e2e
        working-directory: web
        env:
          # Use the prebuilt binary (embeds the UI); run-server.sh skips building.
          RUSKERY_BIN: ${{ github.workspace }}/target/release/ruskery
        run: bunx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          retention-days: 7
