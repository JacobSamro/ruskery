name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: build, lint & test (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # The dashboard must be generated first — rust-embed bundles
      # web/.output/public at compile time.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build web UI
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run generate

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo & target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --locked

      - name: Test (unit + e2e)
        run: cargo test --release --locked

  load:
    name: load test (Ubuntu, informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build web UI
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run generate

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo & target
        uses: Swatinem/rust-cache@v2

      # Throughput/latency are reported to the log but never asserted — CI
      # runners are noisy. The test only fails on correctness invariants
      # (a pull returning the wrong bytes).
      - name: Run load harness
        run: cargo test --release --locked --test load -- --ignored --nocapture
